version: '3'

vars:
  BINARY_NAME: server
  BUILD_DIR: ./build
  CMD_DIR: ./cmd/server
  WEB_DIR: ./web
  STATIC_DIR: ./app/infra/static/web-dist
  PKG_MANAGER: pnpm
  STATIC_GO_TAGS: netgo osusergo sqlite_omit_load_extension
  STATIC_LDFLAGS: -s -w -linkmode external -extldflags "-static"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  build:
    desc: Build web assets and the Go server
    aliases: [build-all]
    deps: [web:build, server:build]
    cmds:
      - echo "Full build complete."

  install:
    desc: Install Go and web dependencies
    deps: [deps, web:install]
    cmds:
      - echo "All dependencies installed."

  clean:all:
    desc: Clean all build artifacts
    aliases: [clean-all]
    deps: [clean, web:clean]
    cmds:
      - echo "All artifacts cleaned."

  dev:
    desc: Run the Go API and Vite dev server
    deps: [run, web:dev]

  server:build:
    desc: Build the Go server binary
    aliases: [server-build]
    deps: [build:dir, web:build]
    cmds:
      - go build -ldflags="-s -w" -o {{.BUILD_DIR}}/{{.BINARY_NAME}}{{exeExt}} {{.CMD_DIR}}

  server:build:static:
    desc: 'Build a static cgo server binary with Zig. Usage: task server:build:static TARGET=linux-amd64'
    aliases: [server-build-static]
    deps: [build:dir, web:build]
    requires:
      vars: [TARGET]
    vars:
      OUT:
        sh: |
          case "{{.TARGET}}" in
            windows-*) printf "{{.BUILD_DIR}}/{{.BINARY_NAME}}-{{.TARGET}}.exe" ;;
            *) printf "{{.BUILD_DIR}}/{{.BINARY_NAME}}-{{.TARGET}}" ;;
          esac
      GOOS:
        sh: printf "{{.TARGET}}" | cut -d- -f1
      GOARCH:
        sh: printf "{{.TARGET}}" | cut -d- -f2
      ZIG_TARGET:
        sh: |
          case "{{.TARGET}}" in
            linux-amd64) printf "x86_64-linux-musl" ;;
            linux-arm64) printf "aarch64-linux-musl" ;;
            windows-amd64) printf "x86_64-windows-gnu" ;;
            windows-arm64) printf "aarch64-windows-gnu" ;;
            *) echo "unsupported TARGET={{.TARGET}}" >&2; exit 1 ;;
          esac
      STATIC_FLAGS:
        sh: printf '%s' '{{.STATIC_LDFLAGS}}'
    env:
      CGO_ENABLED: '1'
      GOOS: '{{.GOOS}}'
      GOARCH: '{{.GOARCH}}'
      CC: 'zig cc -target {{.ZIG_TARGET}}'
      CXX: 'zig c++ -target {{.ZIG_TARGET}}'
    cmds:
      - go build -trimpath -tags '{{.STATIC_GO_TAGS}}' -ldflags '{{.STATIC_FLAGS}}' -o '{{.OUT}}' {{.CMD_DIR}}

  server:build:static:all:
    desc: Build static cgo server binaries for Linux and Windows targets with Zig
    aliases: [server-build-static-all]
    cmds:
      - task server:build:static TARGET=linux-amd64
      - task server:build:static TARGET=linux-arm64
      - task server:build:static TARGET=windows-amd64
      - task server:build:static TARGET=windows-arm64

  server:build:darwin:
    desc: 'Build a dynamically linked macOS cgo server binary. Usage: task server:build:darwin TARGET=darwin-arm64'
    aliases: [server-build-darwin]
    deps: [build:dir, web:build]
    requires:
      vars: [TARGET]
    vars:
      OUT:
        sh: printf "{{.BUILD_DIR}}/{{.BINARY_NAME}}-{{.TARGET}}"
      GOARCH:
        sh: |
          case "{{.TARGET}}" in
            darwin-amd64) printf "amd64" ;;
            darwin-arm64) printf "arm64" ;;
            *) echo "unsupported TARGET={{.TARGET}}" >&2; exit 1 ;;
          esac
      CLANG_ARCH:
        sh: |
          case "{{.TARGET}}" in
            darwin-amd64) printf "x86_64" ;;
            darwin-arm64) printf "arm64" ;;
            *) echo "unsupported TARGET={{.TARGET}}" >&2; exit 1 ;;
          esac
      DARWIN_CGO_FLAGS:
        sh: printf '%s' "-arch {{.CLANG_ARCH}} -isysroot $(xcrun --show-sdk-path)"
    env:
      CGO_ENABLED: '1'
      GOOS: darwin
      GOARCH: '{{.GOARCH}}'
      CC: clang
      CXX: clang++
      CGO_CFLAGS: '{{.DARWIN_CGO_FLAGS}}'
      CGO_LDFLAGS: '{{.DARWIN_CGO_FLAGS}}'
    cmds:
      - go build -trimpath -tags 'netgo osusergo sqlite_omit_load_extension' -ldflags '-s -w -linkmode external' -o '{{.OUT}}' {{.CMD_DIR}}

  server:build:darwin:all:
    desc: Build dynamically linked macOS cgo server binaries
    aliases: [server-build-darwin-all]
    cmds:
      - task server:build:darwin TARGET=darwin-amd64
      - task server:build:darwin TARGET=darwin-arm64

  server:build:cross:all:
    desc: Build all supported platform binaries
    aliases: [server-build-cross-all]
    cmds:
      - task server:build:static:all
      - task server:build:darwin:all

  run:
    desc: Run the Go server in development mode
    deps: [static:dev]
    env:
      DEBUG: 'true'
    cmds:
      - go run {{.CMD_DIR}}/main.go

  run:prod:
    desc: Build and run the Go server in production mode
    aliases: [run-prod]
    deps: [server:build]
    cmds:
      - cmd: $env:DEBUG='false'; $env:ENV='production'; {{.BUILD_DIR}}\{{.BINARY_NAME}}.exe
        platforms: [windows]
      - cmd: DEBUG=false ENV=production {{.BUILD_DIR}}/{{.BINARY_NAME}}
        platforms: [darwin, linux]

  test:
    desc: Run Go tests
    cmds:
      - go test -v ./...

  fmt:
    desc: Format Go code
    cmds:
      - go fmt ./...

  deps:
    desc: Download and tidy Go dependencies
    cmds:
      - go mod download
      - go mod tidy

  clean:
    desc: Clean Go build artifacts
    cmds:
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -Command "Remove-Item -LiteralPath '{{.BUILD_DIR}}' -Recurse -Force -ErrorAction SilentlyContinue"
        platforms: [windows]
      - cmd: rm -rf {{.BUILD_DIR}}
        platforms: [darwin, linux]

  web:install:
    desc: Install web dependencies
    aliases: [web-install]
    dir: '{{.WEB_DIR}}'
    cmds:
      - '{{.PKG_MANAGER}} install'

  web:dev:
    desc: Run the Vite development server
    aliases: [web-dev]
    dir: '{{.WEB_DIR}}'
    cmds:
      - '{{.PKG_MANAGER}} run dev'

  web:build:
    desc: Build web assets for production
    aliases: [web-build]
    dir: '{{.WEB_DIR}}'
    cmds:
      - '{{.PKG_MANAGER}} run build'

  web:clean:
    desc: Clean web build artifacts
    aliases: [web-clean]
    cmds:
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -Command "Remove-Item -LiteralPath '{{.STATIC_DIR}}' -Recurse -Force -ErrorAction SilentlyContinue; Remove-Item -LiteralPath '{{.WEB_DIR}}/stats.html' -Force -ErrorAction SilentlyContinue"
        platforms: [windows]
      - cmd: rm -rf {{.STATIC_DIR}} {{.WEB_DIR}}/stats.html
        platforms: [darwin, linux]

  web:lint:
    desc: Lint web code
    aliases: [web-lint]
    dir: '{{.WEB_DIR}}'
    cmds:
      - '{{.PKG_MANAGER}} run lint'

  web:type-check:
    desc: Type check web code
    aliases: [web-type-check]
    dir: '{{.WEB_DIR}}'
    cmds:
      - '{{.PKG_MANAGER}} run type:check'

  web:check-i18n:
    desc: Check i18n translations
    aliases: [web-check-i18n]
    dir: '{{.WEB_DIR}}'
    cmds:
      - '{{.PKG_MANAGER}} run check:i18n'

  build:dir:
    internal: true
    cmds:
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -Command "New-Item -ItemType Directory -Force -Path '{{.BUILD_DIR}}' | Out-Null"
        platforms: [windows]
      - cmd: mkdir -p {{.BUILD_DIR}}
        platforms: [darwin, linux]

  static:dev:
    desc: Ensure embedded static assets exist for development
    aliases: [static-dev]
    cmds:
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -Command "New-Item -ItemType Directory -Force -Path '{{.STATIC_DIR}}' | Out-Null; if (-not (Test-Path -LiteralPath '{{.STATIC_DIR}}/index.html')) { Set-Content -LiteralPath '{{.STATIC_DIR}}/index.html' -Value '<!doctype html><title>Template Dev</title>' -NoNewline }"
        platforms: [windows]
      - cmd: mkdir -p {{.STATIC_DIR}} && test -f {{.STATIC_DIR}}/index.html || printf '<!doctype html><title>Template Dev</title>' > {{.STATIC_DIR}}/index.html
        platforms: [darwin, linux]
